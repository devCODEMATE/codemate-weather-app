<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeMate Weather</title>
  <meta name="description" content="Real-time weather for any city in the world. Vanilla JS project by CodeMate, defaults to La Plata, Argentina." />

  <!-- Google Fonts: display + body -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css?v=9" />
</head>
<body>

  <!-- Animated sky background, shifts with time of day, weather and season -->
  <div class="sky" id="sky" aria-hidden="true">
    <div class="sky__sun-moon" id="skyBody"></div>
    <div class="sky__cloud sky__cloud--1"></div>
    <div class="sky__cloud sky__cloud--2"></div>
    <div class="particles" id="particles"></div>
  </div>

  <main class="app">

    <header class="topbar">
      <div class="brand">
        <span class="brand__dot"></span>
        <span class="brand__name">CodeMate<span class="brand__accent">Weather</span></span>
      </div>
      <div class="topbar__toggles">
        <button class="lang-toggle" id="langToggle" type="button" aria-label="Change language">
          EN
        </button>
        <button class="unit-toggle" id="unitToggle" type="button" aria-pressed="false">
          °C
        </button>
      </div>
    </header>

    <!-- City search -->
    <div class="search">
      <input
        type="text"
        id="searchInput"
        class="search__input"
        placeholder="Search city or country…"
        autocomplete="off"
      />
      <button class="geo-btn" id="geoBtn" type="button" aria-label="Use my location">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
      <ul class="search__results" id="searchResults" hidden></ul>
      <p class="geo-error" id="geoError" hidden></p>
    </div>

    <!-- Favorite cities: click to jump straight to one -->
    <div class="favorites" id="favoritesBar" hidden></div>

    <!-- Screen-reader-only live status, so loading/errors are announced -->
    <p class="sr-only" id="srStatus" aria-live="polite"></p>

    <!-- Skeleton shown while the first request for a new location is in flight -->
    <div class="skeleton" id="skeleton" aria-hidden="true">
      <div class="skeleton__hero">
        <div class="skeleton__line skeleton__line--eyebrow"></div>
        <div class="skeleton__line skeleton__line--city"></div>
        <div class="skeleton__row">
          <div class="skeleton__circle"></div>
          <div class="skeleton__line skeleton__line--temp"></div>
        </div>
        <div class="skeleton__line skeleton__line--desc"></div>
        <div class="skeleton__stats">
          <div class="skeleton__block"></div>
          <div class="skeleton__block"></div>
          <div class="skeleton__block"></div>
        </div>
      </div>
      <div class="skeleton__hourly">
        <div class="skeleton__line skeleton__line--title"></div>
        <div class="skeleton__hourly-row">
          <div class="skeleton__hour-card"></div>
          <div class="skeleton__hour-card"></div>
          <div class="skeleton__hour-card"></div>
          <div class="skeleton__hour-card"></div>
          <div class="skeleton__hour-card"></div>
        </div>
      </div>
      <div class="skeleton__daily">
        <div class="skeleton__line skeleton__line--title"></div>
        <div class="skeleton__day-row"></div>
        <div class="skeleton__day-row"></div>
        <div class="skeleton__day-row"></div>
        <div class="skeleton__day-row"></div>
      </div>
    </div>

    <!-- Error state (the skeleton hides and this takes over if the request fails) -->
    <div class="status" id="status" hidden>
      <p id="statusText">—</p>
      <button class="retry-btn" id="retryBtn" type="button" hidden>Retry</button>
    </div>

    <!-- HERO: current condition -->
    <section class="hero" id="hero" hidden>
      <p class="hero__eyebrow" id="dateNow">—</p>
      <div class="hero__city-row">
        <h1 class="hero__city" id="cityName">La Plata, Buenos Aires</h1>
        <button class="fav-btn" id="favBtn" type="button" aria-pressed="false" aria-label="Add to favorites">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 3.5l2.6 5.5 6 .8-4.4 4.2 1 6-5.2-2.9-5.2 2.9 1-6-4.4-4.2 6-.8L12 3.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div class="hero__main">
        <div class="hero__icon" id="currentIcon" aria-hidden="true"></div>
        <div class="hero__temp-wrap">
          <span class="hero__temp" id="currentTemp">--</span>
          <span class="hero__unit">°</span>
        </div>
      </div>

      <p class="hero__desc" id="currentDesc">—</p>
      <p class="hero__feels"><span id="feelsLabel">Feels like</span> <strong id="feelsLike">--°</strong></p>

      <div class="stats">
        <div class="stats__item">
          <span class="stats__label" id="humidityLabel">Humidity</span>
          <span class="stats__value" id="humidity">--%</span>
        </div>
        <div class="stats__item">
          <span class="stats__label" id="windLabel">Wind</span>
          <span class="stats__value" id="wind">-- km/h</span>
        </div>
        <div class="stats__item">
          <span class="stats__label" id="rainLabel">Precipitation</span>
          <span class="stats__value" id="rainChance">--%</span>
        </div>
      </div>
    </section>

    <!-- Hourly forecast -->
    <section class="hourly" id="hourlySection" hidden>
      <h2 class="section-title" id="hourlyTitle">Next hours</h2>
      <div class="hourly__scroll" id="hourlyScroll"></div>
    </section>

    <!-- 7-day forecast -->
    <section class="daily" id="dailySection" hidden>
      <h2 class="section-title" id="dailyTitle">Next days</h2>
      <div class="daily__list" id="dailyList"></div>
    </section>

    <footer class="footer">
      <p>
        <span id="footerDataText">Data by</span> <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a>
        · <span id="footerMadeText">Made by</span> <a href="https://github.com/devCODEMATE" target="_blank" rel="noopener">CodeMate</a>
      </p>
    </footer>

  </main>

  <script src="app.js?v=9"></script>
</body>
</html>
