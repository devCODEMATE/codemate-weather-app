<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeMate Weather</title>
  <meta name="description" content="Real-time weather for any city in the world. Vanilla JS project by CodeMate, defaults to La Plata, Argentina." />

  <!-- Google Fonts: display + body -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css?v=5" />
</head>
<body>

  <!-- Animated sky background, shifts with time of day, weather and season -->
  <div class="sky" id="sky" aria-hidden="true">
    <div class="sky__sun-moon" id="skyBody"></div>
    <div class="sky__cloud sky__cloud--1"></div>
    <div class="sky__cloud sky__cloud--2"></div>
  </div>

  <main class="app">

    <header class="topbar">
      <div class="brand">
        <span class="brand__dot"></span>
        <span class="brand__name">CodeMate<span class="brand__accent">Weather</span></span>
      </div>
      <div class="topbar__toggles">
        <button class="lang-toggle" id="langToggle" type="button" aria-label="Change language">
          EN
        </button>
        <button class="unit-toggle" id="unitToggle" type="button" aria-pressed="false">
          °C
        </button>
      </div>
    </header>

    <!-- City search -->
    <div class="search">
      <input
        type="text"
        id="searchInput"
        class="search__input"
        placeholder="Search city or country…"
        autocomplete="off"
      />
      <ul class="search__results" id="searchResults" hidden></ul>
    </div>

    <!-- Loading / error state -->
    <div class="status" id="status">
      <p id="statusText">Loading the sky over La Plata…</p>
      <button class="retry-btn" id="retryBtn" type="button" hidden>Retry</button>
    </div>

    <!-- HERO: current condition -->
    <section class="hero" id="hero" hidden>
      <p class="hero__eyebrow" id="dateNow">—</p>
      <h1 class="hero__city" id="cityName">La Plata, Buenos Aires</h1>

      <div class="hero__main">
        <div class="hero__icon" id="currentIcon" aria-hidden="true"></div>
        <div class="hero__temp-wrap">
          <span class="hero__temp" id="currentTemp">--</span>
          <span class="hero__unit">°</span>
        </div>
      </div>

      <p class="hero__desc" id="currentDesc">—</p>
      <p class="hero__feels"><span id="feelsLabel">Feels like</span> <strong id="feelsLike">--°</strong></p>

      <div class="stats">
        <div class="stats__item">
          <span class="stats__label" id="humidityLabel">Humidity</span>
          <span class="stats__value" id="humidity">--%</span>
        </div>
        <div class="stats__item">
          <span class="stats__label" id="windLabel">Wind</span>
          <span class="stats__value" id="wind">-- km/h</span>
        </div>
        <div class="stats__item">
          <span class="stats__label" id="rainLabel">Precipitation</span>
          <span class="stats__value" id="rainChance">--%</span>
        </div>
      </div>
    </section>

    <!-- Hourly forecast -->
    <section class="hourly" id="hourlySection" hidden>
      <h2 class="section-title" id="hourlyTitle">Next hours</h2>
      <div class="hourly__scroll" id="hourlyScroll"></div>
    </section>

    <!-- 7-day forecast -->
    <section class="daily" id="dailySection" hidden>
      <h2 class="section-title" id="dailyTitle">Next days</h2>
      <div class="daily__list" id="dailyList"></div>
    </section>

    <footer class="footer">
      <p>
        <span id="footerDataText">Data by</span> <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a>
        · <span id="footerMadeText">Made by</span> <a href="https://github.com/devCODEMATE" target="_blank" rel="noopener">CodeMate</a>
      </p>
    </footer>

  </main>

  <script src="app.js?v=5"></script>
</body>
</html>
